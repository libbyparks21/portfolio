<!DOCTYPE html>
<link rel="stylesheet" href="style.css">
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial_scale=1.0">
        <div class="logo"> 
            <img src="/logo/goofy-logo-lp.png" alt="goofy-logo-lp" class="logo-image">
        </div> 
        <div class="tabs">
        <span class="tab-link active" onclick="showTab('sports', event)">Sports</span>
        <span class="tab-link" onclick="showTab('ads', event)">Ads</span>
        <span class="tab-link" onclick="showTab('threeD', event)">3D</span>
        <span class="tab-link" onclick="showTab('fun', event)">Fun</span>
        </div>
    </head>
    <body>
        <!-- SPORTS TAB -->
        <section id="sports" class="tab active">
            <div class="grid-container">
                <div class="video-wrapper small">
                    <a href="https://vimeo.com/1160642056" target="_blank">
                        <div class="video-container" style="padding:56.25% 0 0 0;position:relative;">
                            <iframe 
                                src="https://player.vimeo.com/video/1160642056?autoplay=1&muted=1&loop=1&background=1"
                                frameborder="0"
                                allow="autoplay; fullscreen">
                            </iframe>

                            <div class="video-overlay">
                                <h3>Utah Jazz - Season Ticket Deposits </h3>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="video-wrapper small">
                    <a href="https://youtu.be/ysp_v8G8Ots?si=rkZ56qHQCVy6yAmS" target="_blank">
                        <div class="video-container" style="padding:56.25% 0 0 0;position:relative;">
                            <iframe 
                                src="https://player.vimeo.com/video/1171966319?autoplay=1&muted=1&loop=1&background=1"
                                frameborder="0"
                                allow="autoplay; fullscreen">
                            </iframe>
                            <div class="video-overlay">
                                <h3>All Access - Utah's Rising Star </h3>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="video-wrapper small">
                    <a href="https://vimeo.com/1136600223" target="_blank">
                        <div class="video-container" style="padding:56.25% 0 0 0;position:relative;">
                            <iframe 
                                src="https://player.vimeo.com/video/1136600223?autoplay=1&muted=1&loop=1&background=1"
                                frameborder="0"
                                allow="autoplay; fullscreen">
                            </iframe>
                            <div class="video-overlay">
                                <h3>Salt Lake City Stars Arena Intro</h3>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="video-wrapper small">
                    <a href="https://vimeo.com/1117230479" target="_blank">
                        <div class="video-container" style="padding:56.25% 0 0 0;position:relative;">
                            <iframe 
                                src="https://player.vimeo.com/video/1117230479?autoplay=1&muted=1&loop=1&background=1"
                                frameborder="0"
                                allow="autoplay; fullscreen">
                            </iframe>
                            <div class="video-overlay">
                                <h3>Utah Jazz - Family Ticket Sales Ad</h3>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </section>
        <!-- ADS TAB -->
        <section id="ads" class="tab">
            <div class="grid-container">
                <div class="video-wrapper small">
                    <a href="https://vimeo.com/1160648628" target="_blank">
                        <div class="video-container" style="padding:56.25% 0 0 0;position:relative;">
                            <iframe 
                                src="https://player.vimeo.com/video/1160648628?autoplay=1&muted=1&loop=1&background=1"
                                frameborder="0"
                                allow="autoplay; fullscreen">
                            </iframe>
                            <div class="video-overlay">
                                <h3>Whitespace x Jazz Brand Collab </h3>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </section>
        <!-- 3D TAB -->
         <section id="threeD" class="tab">
            <div class="grid-container">
                <div class="video-wrapper small">
                    <video src="/old files/dewsim-out5.mp4" autoplay muted loop></video>
                </div>
                <div class="video-wrapper small">
                    <video src="/old files/skiddies.mp4" autoplay muted loop></video>
                    <img src="/old files/stud-acad.png" alt="Overlay" class="award-image">
                </div>
                <div class="video-wrapper small">
                    <video src="/old files/bear-lake.mp4" autoplay muted loop></video>
                </div>
                <div class="video-wrapper small">
                    <video src="/old files/trees.mp4" autoplay muted loop></video>
                    <img src="/old files/stud-acad.png" alt="Overlay" class="award-image">
                </div>
            </div>
         </section>
        <!-- FUN TAB -->
         <section id="fun" class="tab">
            <div class="grid-container">
                <div class="video-wrapper small">
                    <a href="https://vimeo.com/1176792453/88e5510cd0?share=copy&fl=sv&fe=ci" target="_blank">
                        <div class="video-container" style="padding:56.25% 0 0 0;position:relative;">
                            <iframe 
                                src="https://player.vimeo.com/video/1176792453?h=88e5510cd0&amp;badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479&amp;autoplay=1&amp;muted=1&amp;background=1&amp;loop=1"
                                frameborder="0"
                                allow="autoplay; fullscreen">
                            </iframe>
                            <div class="video-overlay">
                                <h3>Whiplash Trailer </h3>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
         </section>
         <footer class="footer"></footer>
        <script src="script.js"></script>
    </body>
</html
